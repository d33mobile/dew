<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Wietrzyć?</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --ink:#e2e8f0; --muted:#94a3b8;
    --track:#334155; --accent:#38bdf8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;
    padding:max(10px,env(safe-area-inset-top)) 14px max(10px,env(safe-area-inset-bottom));
    min-height:100%;gap:10px;
  }
  h1{font-size:1.05rem;margin:0;font-weight:600;letter-spacing:.2px}
  h1 small{color:var(--muted);font-weight:400}
  .verdict{
    border-radius:16px;padding:14px 16px;text-align:center;
    font-weight:700;line-height:1.25;transition:background .2s;
  }
  .verdict .big{font-size:1.5rem;display:block}
  .verdict .sub{font-size:.85rem;font-weight:500;opacity:.92;margin-top:4px}
  .verdict.yes{background:linear-gradient(135deg,#14532d,#166534);color:#dcfce7}
  .verdict.no{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fee2e2}
  .verdict.eq{background:linear-gradient(135deg,#854d0e,#a16207);color:#fef9c3}
  .sliders{display:flex;flex-direction:column;gap:10px;flex:1;justify-content:center}

  /* whole card is the touch surface; vertical position is ignored */
  .ctl{
    background:var(--card);border-radius:14px;padding:11px 14px 16px;
    touch-action:pan-y;cursor:ew-resize;
  }
  .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .row .lbl{font-size:.9rem;color:var(--muted);pointer-events:none}
  .row .val{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums;pointer-events:none}
  .slider{position:relative;height:14px;pointer-events:none}
  .slider .track{position:absolute;top:3px;left:0;right:0;height:8px;border-radius:6px;background:var(--track)}
  .slider .fill{position:absolute;top:3px;left:0;height:8px;border-radius:6px;background:var(--accent)}
  .slider .thumb{
    position:absolute;top:50%;width:30px;height:30px;border-radius:50%;
    background:#f8fafc;border:3px solid var(--accent);box-shadow:0 1px 5px #0007;
    transform:translate(-50%,-50%);
  }
  .ctl.active .thumb{box-shadow:0 0 0 8px #38bdf833,0 1px 5px #0007}
  .stats{display:flex;gap:10px;font-size:.8rem;color:var(--muted)}
  .stats div{flex:1;background:var(--card);border-radius:12px;padding:9px 11px;text-align:center}
  .stats b{display:block;color:var(--ink);font-size:1.1rem;font-variant-numeric:tabular-nums;margin-top:2px}
  footer{text-align:center;color:var(--muted);font-size:.7rem}
</style>
</head>
<body>
  <h1>Wietrzyć? <small>— czy obniżysz wilgotność</small></h1>

  <div id="verdict" class="verdict"><span class="big"></span><span class="sub"></span></div>

  <div class="sliders">
    <div class="ctl" data-key="tin" data-min="22" data-max="27" data-step="0.5" data-val="24">
      <div class="row"><span class="lbl">🌡️ Temperatura w środku</span><span class="val"></span></div>
      <div class="slider"><div class="track"></div><div class="fill"></div><div class="thumb"></div></div>
    </div>
    <div class="ctl" data-key="rhin" data-min="40" data-max="60" data-step="1" data-val="55">
      <div class="row"><span class="lbl">💧 Wilgotność w środku</span><span class="val"></span></div>
      <div class="slider"><div class="track"></div><div class="fill"></div><div class="thumb"></div></div>
    </div>
    <div class="ctl" data-key="tdout" data-min="5" data-max="20" data-step="0.5" data-val="17">
      <div class="row"><span class="lbl">🌫️ Punkt rosy na zewnątrz</span><span class="val"></span></div>
      <div class="slider"><div class="track"></div><div class="fill"></div><div class="thumb"></div></div>
    </div>
  </div>

  <div class="stats">
    <div>Punkt rosy w środku<b id="tdin">–</b></div>
    <div>Wilgotność po wywietrzeniu<b id="rhafter">–</b></div>
  </div>

  <footer>Punkt rosy ≈ absolutna wilgotność. Wietrzysz „suchsze” powietrze gdy rosa na zewnątrz jest niższa niż w środku.</footer>

<script>
const B=17.62, C=243.12;
const gamma=(t,rh)=>Math.log(rh/100)+(B*t)/(C+t);
const dewPoint=(t,rh)=>{const g=gamma(t,rh);return C*g/(B-g);};
const rhAfter=(tdOut,tIn)=>100*Math.exp((B*tdOut)/(C+tdOut)-(B*tIn)/(C+tIn));

const state={};
const units={tin:'°C',rhin:'%',tdout:'°C'};
const dec={tin:1,rhin:0,tdout:1};

document.querySelectorAll('.ctl').forEach(ctl=>{
  const key=ctl.dataset.key;
  const min=+ctl.dataset.min, max=+ctl.dataset.max, step=+ctl.dataset.step;
  state[key]=+ctl.dataset.val;
  const track=ctl.querySelector('.slider');
  const fill=ctl.querySelector('.fill');
  const thumb=ctl.querySelector('.thumb');
  const valEl=ctl.querySelector('.val');

  function paint(){
    const pct=(state[key]-min)/(max-min)*100;
    fill.style.width=pct+'%';
    thumb.style.left=pct+'%';
    valEl.textContent=state[key].toFixed(dec[key])+' '+units[key];
  }
  // horizontal position only — clientY completely ignored
  function setFromX(clientX){
    const r=track.getBoundingClientRect();
    let f=(clientX-r.left)/r.width;
    f=Math.max(0,Math.min(1,f));
    let v=min+f*(max-min);
    v=Math.round(v/step)*step;
    v=Math.max(min,Math.min(max,v));
    if(v!==state[key]){state[key]=v;paint();render();}
    else{paint();}
  }
  ctl.addEventListener('pointerdown',e=>{
    ctl.setPointerCapture(e.pointerId);
    ctl.classList.add('active');
    setFromX(e.clientX);
  });
  ctl.addEventListener('pointermove',e=>{
    if(!ctl.hasPointerCapture(e.pointerId))return;
    e.preventDefault();
    setFromX(e.clientX);
  });
  const end=e=>{ctl.classList.remove('active');};
  ctl.addEventListener('pointerup',end);
  ctl.addEventListener('pointercancel',end);

  ctl._paint=paint;
});

function render(){
  const tin=state.tin, rhin=state.rhin, tdout=state.tdout;
  const tdin=dewPoint(tin,rhin);
  $('tdin').textContent=tdin.toFixed(1)+' °C';
  const after=Math.min(100,rhAfter(tdout,tin));
  $('rhafter').textContent=after.toFixed(0)+' %';

  const diff=tdin-tdout;
  const v=$('verdict'), big=v.querySelector('.big'), sub=v.querySelector('.sub');
  if(diff>0.3){
    v.className='verdict yes';
    big.textContent='✅ TAK, wietrz';
    sub.textContent=`Na zewnątrz suchsze o ${diff.toFixed(1)} °C rosy — wilgotność spadnie ~${(rhin-after).toFixed(0)} pkt%.`;
  }else if(diff<-0.3){
    v.className='verdict no';
    big.textContent='⛔ NIE wietrz';
    sub.textContent=`Na zewnątrz wilgotniej o ${(-diff).toFixed(1)} °C rosy — wpuścisz więcej wody.`;
  }else{
    v.className='verdict eq';
    big.textContent='≈ Bez różnicy';
    sub.textContent='Powietrze w środku i na zewnątrz ma podobną wilgotność absolutną.';
  }
}
function $(id){return document.getElementById(id);}

document.querySelectorAll('.ctl').forEach(c=>c._paint());
render();
</script>
</body>
</html>
